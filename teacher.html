<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard — Flashcards</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="loading-screen" class="center-screen">
    <p class="muted">Loading…</p>
  </div>

  <div id="lock-screen" class="center-screen" style="display:none;">
    <div class="lock-card card">
      <div class="dot-logo"></div>
      <h2>Teacher dashboard</h2>
      <p class="muted">Enter your PIN to continue.</p>
      <div class="field" style="text-align:left;">
        <input type="password" id="pin-input" placeholder="PIN" autocomplete="off" />
      </div>
      <p id="pin-error" style="display:none; color:var(--red); font-size:13px; margin-top:-8px;">Incorrect PIN — try again.</p>
      <button class="btn btn-primary btn-block" id="pin-unlock-btn">Unlock</button>
    </div>
  </div>

  <div id="app" class="app-shell" style="display:none;">
    <nav class="sidebar">
      <div class="sidebar-brand"><span class="dot"></span> Flashcards</div>
      <button class="nav-item deep" id="library-nav-btn">📚 Manage library</button>
      <div class="sidebar-foot" style="margin:14px 0 6px; text-transform:uppercase; letter-spacing:0.04em; font-weight:700;">Students</div>
      <div id="student-list" style="display:flex; flex-direction:column; gap:2px; overflow-y:auto;"></div>
      <div class="sidebar-spacer"></div>
      <button class="btn btn-primary btn-sm btn-block" id="add-student-btn">+ Add student</button>
      <button class="btn btn-ghost btn-sm btn-block mt-sm" id="refresh-btn">↻ Refresh data</button>
    </nav>

    <div class="main">
      <div class="topbar">
        <div style="font-weight:700;">Teacher dashboard</div>
      </div>
      <div class="content" style="max-width:1100px;">
        <div id="dashboard-area"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/teacher-app.js"></script>
</body>
</html>
